<!DOCTYPE html>
<html lang="zh-TW" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CLAUDE NEWS · LLM-WIKI</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="stylesheet" href="assets/design.css">
</head>
<body>

<!-- NAV -->
<nav class="nav">
  <div class="nav__inner">
    <div class="nav__brand" onclick="switchView('today', document.querySelector('.nav__link'))">
      <div class="nav__brand-main">CLAUDE NEWS<span>·</span></div>
      <div class="nav__brand-sub">LLM-WIKI</div>
    </div>
    <div class="nav__links">
      <button class="nav__link is-active" data-view="today"
              onclick="switchView('today', this)">今日摘要</button>
      <button class="nav__link" data-view="wiki"
              onclick="switchView('wiki', this)">Wiki 知識庫</button>
      <button class="nav__link" data-view="archive"
              onclick="switchView('archive', this)">典藏</button>
    </div>
    <div class="nav__right">
      <button class="nav__theme" onclick="toggleTheme()" title="切換主題" aria-label="切換明暗主題">☀</button>
      <div class="nav__search" tabindex="0">
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
        搜尋 wiki…
        <span class="kbd">/</span>
      </div>
    </div>
  </div>
</nav>

<!-- TODAY FEED -->
<div id="view-today" class="view is-active">
  <div class="feed">
    <div id="digest-content"></div>
  </div>
</div>

<!-- WIKI -->
<div id="view-wiki" class="view">
  <div class="wiki">
    <h1 class="wiki__h1">Wiki 知識庫</h1>
    <div class="wiki__sub" id="wiki-sub">點擊實體查看詳細頁面</div>

    <div class="wiki__section-h">Entities — 實體頁</div>
    <div class="entity-table" id="wiki-entities"></div>

    <div class="wiki__section-h" style="margin-top:36px">Topics — 進行中議題</div>
    <div class="entity-table" id="wiki-topics"></div>

    <div class="wiki__note" style="margin-top:16px">新 entity：日報提及 2 次以上 → 建立 entities/ 頁面 &nbsp;·&nbsp; 新 topic：事件跨越 2 天以上 → 建立 topics/ 頁面</div>
  </div>
</div>

<!-- ARCHIVE -->
<div id="view-archive" class="view">
  <div class="archive">
    <h1 class="archive__h1">典藏</h1>
    <div class="archive__sub" id="archive-sub"></div>
    <div class="archive__grid" id="archive-grid"></div>
  </div>
</div>

<!-- FOOTER -->
<footer class="reader-footer">
  <span>自動產生 by Claude Code News Aggregator</span>
  <span class="sep">·</span>
  <span>CLAUDE NEWS · LLM-WIKI</span>
</footer>

<!-- MODAL -->
<div class="modal-scrim" id="modal-scrim">
  <div class="modal" id="wiki-modal-inner"></div>
</div>

<!-- Data (generated by scripts/build_web.py) -->
<script src="data/data.js?v=1777683112"></script>
<!-- Markdown renderer -->
<script src="https://cdn.jsdelivr.net/npm/marked@12/marked.min.js"></script>
<!-- App logic -->
<script src="assets/app.js"></script>
</body>
</html>
