<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Colors — Brand</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-0); width: 700px; box-sizing: border-box; }
  .row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .swatch {
    border: 1px solid var(--border-1);
    border-radius: var(--radius-3);
    padding: 14px 16px;
    background: var(--bg-1);
    display: flex;
    flex-direction: column;
    gap: 10px;
  }
  .chip-strip { display: flex; gap: 4px; height: 36px; border-radius: var(--radius-1); overflow: hidden; }
  .chip-strip > div { flex: 1; }
  .label { display: flex; justify-content: space-between; font-family: var(--font-mono); font-size: 12px; color: var(--fg-2); }
  .label b { color: var(--fg-1); font-weight: 600; }
  .role { color: var(--fg-3); font-size: 11px; font-family: var(--font-mono); margin-top: -2px; }
</style>
</head>
<body>
<div class="row">
  <div class="swatch">
    <div class="chip-strip">
      <div style="background:#574CA8"></div>
      <div style="background:#7C6CDC"></div>
      <div style="background:#9B8BFF"></div>
    </div>
    <div class="label"><b>Purple — Obsidian brand</b><span>5 / 7 / 9</span></div>
    <div class="role">wikilinks · focus · day badge ring</div>
    <div class="label" style="font-size:11px">#574CA8 · #7C6CDC · #9B8BFF</div>
  </div>
  <div class="swatch">
    <div class="chip-strip">
      <div style="background:#A87B4F"></div>
      <div style="background:#D4A574"></div>
      <div style="background:#E8C49A"></div>
    </div>
    <div class="label"><b>Tan — warm accent</b><span>5 / 7 / 9</span></div>
    <div class="role">⭐ top story rail · headline number</div>
    <div class="label" style="font-size:11px">#A87B4F · #D4A574 · #E8C49A</div>
  </div>
</div>
</body>
</html>
