<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Components — Day Badge & TOC</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 20px; background: var(--bg-0); width: 700px; box-sizing: border-box; display: flex; gap: 20px; align-items:flex-start; }
  .day-badge {
    width: 96px; height: 96px;
    border-radius: var(--radius-3); border: 1px solid var(--tan-7);
    background: linear-gradient(180deg, var(--bg-2), var(--bg-1));
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    box-shadow: 0 0 0 4px var(--tan-tint);
    position: relative;
  }
  .day-badge .y { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); }
  .day-badge .d { font-family: var(--font-display); font-weight: 700; font-size: 36px; color: var(--tan-9); letter-spacing: -0.02em; line-height: 1; margin: 2px 0; }
  .day-badge .m { font-family: var(--font-mono); font-size: 11px; color: var(--fg-2); text-transform: uppercase; letter-spacing: 0.08em; }
  .toc {
    flex: 1; background: var(--bg-1); border:1px solid var(--border-1);
    border-radius: var(--radius-3); padding: 14px;
  }
  .toc .h { font-family: var(--font-display); font-size: 11px; text-transform: uppercase; letter-spacing: 0.06em; color: var(--fg-3); margin-bottom: 8px; }
  .toc a { display: flex; gap: 8px; align-items: baseline; padding: 4px 0; color: var(--fg-2); text-decoration: none; font-size: 13px; border-left: 2px solid transparent; padding-left: 10px; margin-left: -10px; }
  .toc a:hover { color: var(--fg-1); }
  .toc a.active { color: var(--fg-1); border-left-color: var(--purple-7); }
  .toc a .n { font-family: var(--font-mono); color: var(--fg-3); font-size: 11px; min-width: 16px; }
</style>
</head>
<body>
<div class="day-badge">
  <div class="y">2026</div>
  <div class="d">30</div>
  <div class="m">Apr · Wed</div>
</div>
<div class="toc">
  <div class="h">Today · 52 articles</div>
  <a href="#" class="active"><span class="n">⭐</span> 重點話題 <span style="margin-left:auto; color:var(--fg-3); font-family:var(--font-mono); font-size:11px">4</span></a>
  <a href="#"><span class="n">🔧</span> 技術更新 <span style="margin-left:auto; color:var(--fg-3); font-family:var(--font-mono); font-size:11px">6</span></a>
  <a href="#"><span class="n">💬</span> 技術熱度討論 <span style="margin-left:auto; color:var(--fg-3); font-family:var(--font-mono); font-size:11px">12</span></a>
  <a href="#"><span class="n">💰</span> 付費方案動態 <span style="margin-left:auto; color:var(--fg-3); font-family:var(--font-mono); font-size:11px">3</span></a>
  <a href="#"><span class="n">📌</span> 今日聚焦 <span style="margin-left:auto; color:var(--fg-3); font-family:var(--font-mono); font-size:11px">5</span></a>
</div>
</body>
</html>
