<!doctype html>
<html lang="en" data-theme="dark">
<head>
<meta charset="utf-8">
<title>Brand — Logo</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin: 0; padding: 24px; background: var(--bg-0); width: 700px; box-sizing: border-box; display: flex; flex-direction: column; gap: 16px; }
  .swatch { background: var(--bg-1); border: 1px solid var(--border-1); border-radius: var(--radius-3); padding: 20px 24px; display: flex; align-items: center; gap: 16px; }
  .swatch.light { background: #FAF7F0; border-color: rgba(0,0,0,0.08); }
  .lbl { font-family: var(--font-mono); font-size: 11px; color: var(--fg-3); margin-left: auto; }
  .swatch.light .lbl { color: rgba(20,14,4,0.5); }
</style>
</head>
<body>
<div class="swatch">
  <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
    <rect x="2" y="2" width="40" height="40" rx="8" fill="#1E1E2E" stroke="#7C6CDC" stroke-width="1"/>
    <path d="M14 18 L14 26 L18 26" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="22" r="2.5" fill="#7C6CDC"/>
    <path d="M30 18 L30 26 L26 26" stroke="#D4A574" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </svg>
  <div>
    <div style="font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; color: var(--fg-1); line-height: 1;">CLAUDE NEWS</div>
    <div style="font-family: var(--font-mono); font-size: 11px; color: var(--purple-7); letter-spacing: 0.18em; margin-top: 4px; text-transform: uppercase;">L L M · W I K I</div>
  </div>
  <span class="lbl">on dark</span>
</div>
<div class="swatch light">
  <svg width="44" height="44" viewBox="0 0 44 44" fill="none">
    <rect x="2" y="2" width="40" height="40" rx="8" fill="#FFFFFF" stroke="#7C6CDC" stroke-width="1"/>
    <path d="M14 18 L14 26 L18 26" stroke="#A87B4F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
    <circle cx="22" cy="22" r="2.5" fill="#7C6CDC"/>
    <path d="M30 18 L30 26 L26 26" stroke="#A87B4F" stroke-width="1.5" stroke-linecap="round" fill="none"/>
  </svg>
  <div>
    <div style="font-family: var(--font-display); font-weight: 700; font-size: 20px; letter-spacing: -0.02em; color: #1A1A24; line-height: 1;">CLAUDE NEWS</div>
    <div style="font-family: var(--font-mono); font-size: 11px; color: #5C4DBF; letter-spacing: 0.18em; margin-top: 4px; text-transform: uppercase;">L L M · W I K I</div>
  </div>
  <span class="lbl">on paper</span>
</div>
</body>
</html>
